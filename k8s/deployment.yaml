apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harness-demo
  template:
    metadata:
      labels:
        app: harness-demo
    spec:
      containers:
      - name: harness-demo
        image: <+artifacts.primary.image>
        ports:
        - containerPort: 80